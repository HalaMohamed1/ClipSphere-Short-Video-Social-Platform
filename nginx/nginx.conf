upstream backend {
    server backend:5050;
}

upstream frontend {
    server frontend:3000;
}

upstream storage {
    server storage:9000;
}

server {
    listen 80;
    server_name _;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # Large video uploads — match the backend MAX_VIDEO_UPLOAD_MB
    client_max_body_size 210m;

    # ----------------------------------------------------------------
    # Express REST API
    # ----------------------------------------------------------------
    location /api/ {
        proxy_pass         http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Long timeout for video upload processing
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ----------------------------------------------------------------
    # Storage (MinIO)
    # ----------------------------------------------------------------
    location /storage/ {
        rewrite ^/storage/(.*) /$1 break;
        proxy_pass         http://storage;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ----------------------------------------------------------------
    # Socket.io — needs HTTP upgrade for WebSocket transport
    # ----------------------------------------------------------------
    location /socket.io/ {
        proxy_pass         http://backend/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }

    # ----------------------------------------------------------------
    # Swagger API docs
    # ----------------------------------------------------------------
    location /api-docs/ {
        proxy_pass         http://backend/api-docs/;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ----------------------------------------------------------------
    # Backend health check
    # ----------------------------------------------------------------
    location = /health {
        proxy_pass http://backend/health;
    }

    # ----------------------------------------------------------------
    # Next.js Static Asset Offloading
    # ----------------------------------------------------------------
    location /_next/static/ {
        alias /app/.next/static/;
        expires 365d;
        access_log off;
    }

    # ----------------------------------------------------------------
    # Next.js — HMR WebSocket in development (_next/webpack-hmr)
    # ----------------------------------------------------------------
    location /_next/webpack-hmr {
        proxy_pass         http://frontend/_next/webpack-hmr;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ----------------------------------------------------------------
    # Next.js frontend (catch-all)
    # ----------------------------------------------------------------
    location / {
        proxy_pass         http://frontend/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
