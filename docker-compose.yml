networks:
  clipsphere_net:
    driver: bridge

services:
  database:
    image: mongo:7
    container_name: clipsphere_database
    restart: unless-stopped
    networks:
      - clipsphere_net
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  cache:
    image: redis:7-alpine
    container_name: clipsphere_cache
    restart: unless-stopped
    networks:
      - clipsphere_net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  storage:
    image: minio/minio:latest
    container_name: clipsphere_storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    networks:
      - clipsphere_net
    ports:
      - "9001:9001"   # MinIO console (browser)
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    container_name: clipsphere_minio_init
    networks:
      - clipsphere_net
    depends_on:
      storage:
        condition: service_healthy
    volumes:
      - ./docker/minio/cors.json:/config/cors.json:ro
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mc alias set local http://storage:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb local/clipsphere-videos      --ignore-existing
        mc mb local/clipsphere-thumbnails  --ignore-existing
        mc cors set local/clipsphere-videos     /config/cors.json
        mc cors set local/clipsphere-thumbnails /config/cors.json
        mc anonymous set none local/clipsphere-videos
        mc anonymous set none local/clipsphere-thumbnails
        echo "MinIO buckets and CORS configured (private; presigned URLs only)."
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clipsphere_backend
    restart: unless-stopped
    networks:
      - clipsphere_net
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
      storage:
        condition: service_healthy
    environment:
      NODE_ENV:      production
      PORT:          5050
      MONGODB_URI:   mongodb://database:27017/clipsphere
      REDIS_URL:     redis://cache:6379
      MINIO_ENDPOINT:           http://storage:9000
      MINIO_REGION:             ${MINIO_REGION:-us-east-1}
      MINIO_ACCESS_KEY:         ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY:         ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_VIDEOS:      ${MINIO_BUCKET_VIDEOS:-clipsphere-videos}
      MINIO_BUCKET_THUMBNAILS:  ${MINIO_BUCKET_THUMBNAILS:-clipsphere-thumbnails}
      MAX_VIDEO_UPLOAD_MB:      ${MAX_VIDEO_UPLOAD_MB:-200}
      JWT_SECRET:    ${JWT_SECRET}
      JWT_EXPIRE:    ${JWT_EXPIRE:-24h}
      # Hardcoded — root .env has localhost:5050 for local dev which must not bleed into Docker
      CLIENT_ORIGIN: "http://localhost"
      SERVER_URL:    "https://localhost"
      # HTTP-only Docker deployment — cookies must not have the Secure flag
      COOKIE_SECURE: "true"
      STRIPE_SECRET_KEY:      ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET:  ${STRIPE_WEBHOOK_SECRET:-}
      EMAIL_SERVICE: ${EMAIL_SERVICE:-}
      EMAIL_USER:    ${EMAIL_USER:-}
      EMAIL_PASS:    ${EMAIL_PASS:-}
      EMAIL_FROM:    ${EMAIL_FROM:-noreply@clipsphere.local}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5050/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./nextjs-frontend
      dockerfile: Dockerfile
      args:
        # Always use Nginx as the API entry point in Docker, regardless of root .env
        NEXT_PUBLIC_API_URL: "https://localhost/api/v1"
    container_name: clipsphere_frontend
    restart: unless-stopped
    networks:
      - clipsphere_net
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT:     3000
    volumes:
      - frontend_static:/app/.next/static
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3000,'localhost',function(){process.exit(0)}).on('error',function(){process.exit(1)})"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # ──────────────────────────────────────────────────────────────
  # Phase 4: Backend Worker — BullMQ Job Consumer
  # ──────────────────────────────────────────────────────────────
  # Uncomment to enable worker process for email and video metadata jobs
  # For local development, run "npm run worker:dev" in a separate terminal instead
  # For production, this service handles background job processing in isolation
  # ──────────────────────────────────────────────────────────────
  # worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: clipsphere_worker
  #   restart: unless-stopped
  #   command: npm run worker
  #   networks:
  #     - clipsphere_net
  #   depends_on:
  #     database:
  #       condition: service_healthy
  #     cache:
  #       condition: service_healthy
  #   environment:
  #     NODE_ENV:      production
  #     MONGODB_URI:   mongodb://database:27017/clipsphere
  #     REDIS_URL:     redis://cache:6379
  #     MINIO_ENDPOINT:           http://storage:9000
  #     MINIO_REGION:             ${MINIO_REGION:-us-east-1}
  #     MINIO_ACCESS_KEY:         ${MINIO_ROOT_USER:-minioadmin}
  #     MINIO_SECRET_KEY:         ${MINIO_ROOT_PASSWORD:-minioadmin123}
  #     MINIO_BUCKET_VIDEOS:      ${MINIO_BUCKET_VIDEOS:-clipsphere-videos}
  #     MINIO_BUCKET_THUMBNAILS:  ${MINIO_BUCKET_THUMBNAILS:-clipsphere-thumbnails}
  #     EMAIL_SERVICE: ${EMAIL_SERVICE:-}
  #     EMAIL_USER:    ${EMAIL_USER:-}
  #     EMAIL_PASS:    ${EMAIL_PASS:-}
  #     EMAIL_FROM:    ${EMAIL_FROM:-noreply@clipsphere.local}

  # ──────────────────────────────────────────────
  # Stripe CLI — webhook forwarder (mirrors stripe-forward.sh)
  # Check container logs for the whsec_... signing secret and
  # update STRIPE_WEBHOOK_SECRET in .env if it differs from the stored value.
  # ──────────────────────────────────────────────
  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: clipsphere_stripe
    restart: unless-stopped
    networks:
      - clipsphere_net
    depends_on:
      backend:
        condition: service_healthy
    environment:
      STRIPE_API_KEY:    ${STRIPE_SECRET_KEY}
      STRIPE_DEVICE_NAME: clipsphere-docker
    command: listen --forward-to http://backend:5050/api/v1/webhooks/stripe

  nginx:
    image: nginx:alpine
    container_name: clipsphere_nginx
    restart: unless-stopped
    networks:
      - clipsphere_net
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - frontend_static:/app/.next/static:ro
volumes:
  mongo_data:
  minio_data:
  redis_data:
  frontend_static:
